# ===========================================
# Development overrides (auto-loaded by docker-compose)
# Adds: frontend, ports, volumes for hot-reload
# ===========================================

services:
  api:
    command: /bin/sh -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - ./backend:/api:cached
      - bundle-volume:/usr/local/bundle
    ports:
      - "3001:3000"
    tty: true
    stdin_open: true

  db:
    ports:
      - "3306:3306"

  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "yarn install --frozen-lockfile && yarn dev"
    volumes:
      - ./frontend/app:/front:cached
      - node-modules-volume:/front/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
      VITE_CONFIRM_SUCCESS_URL: ${VITE_CONFIRM_SUCCESS_URL:-http://localhost:3000/confirmation-success}
    tty: true
    stdin_open: true
    networks:
      - app-network

volumes:
  bundle-volume:
  node-modules-volume:
